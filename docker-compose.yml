version: "3.9"

services:

  backend:
    build:
      context: ./backend
    container_name: fastapi_backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app
      - sqlite_data:/app/data

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: react_frontend

    depends_on:
      - backend

    ports:
      - "3000:80"

    restart: unless-stopped

volumes:
  sqlite_data:
